<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShareBox Asset Manager</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet" />

  <style>
    /* ── CSS 변수 ── */
    :root {
      --bg-primary:   #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary:  #2d2d2d;
      --bg-input:     #3c3c3c;
      --bg-hover:     #37373d;
      --bg-active:    #094771;
      --border:       #3e3e42;
      --border-light: #555558;
      --text-primary: #cccccc;
      --text-secondary: #9d9d9d;
      --text-muted:   #6b6b6b;
      --text-bright:  #ffffff;
      --accent:       #007acc;
      --accent-hover: #1a8ad4;
      --success:      #4caf50;
      --warning:      #ff9800;
      --danger:       #f44336;
      --badge-viewer: #5a5a5a;
      --badge-editor: #1b5e8a;
      --badge-admin:  #6a1b9a;
      --radius-sm:    4px;
      --radius-md:    6px;
      --radius-lg:    8px;
      --font: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    [data-theme="light"] {
      --bg-primary:   #ffffff;
      --bg-secondary: #f3f3f3;
      --bg-tertiary:  #ececec;
      --bg-input:     #ffffff;
      --bg-hover:     #e8e8e8;
      --bg-active:    #cce5ff;
      --border:       #dcdcdc;
      --border-light: #c0c0c0;
      --text-primary: #1e1e1e;
      --text-secondary: #555555;
      --text-muted:   #999999;
      --text-bright:  #000000;
      --accent:       #0066b8;
      --accent-hover: #005a9e;
      --success:      #2e7d32;
      --warning:      #e65100;
      --danger:       #c62828;
      --badge-viewer: #9e9e9e;
      --badge-editor: #1565c0;
      --badge-admin:  #6a1b9a;
    }

    /* ── 리셋 & 베이스 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font);
      font-size: 13px;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
    }
    button {
      font-family: var(--font);
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-primary);
    }
    input, select {
      font-family: var(--font);
      font-size: 13px;
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    a { color: var(--accent); text-decoration: none; }

    /* ── 앱 레이아웃 ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 40px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      user-select: none;
    }
    #header-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-bright);
      white-space: nowrap;
    }
    #header-logo svg { color: var(--accent); }
    #header-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      flex-shrink: 0;
    }
    #project-select {
      height: 26px;
      min-width: 160px;
      max-width: 220px;
      font-size: 12px;
    }
    #header-spacer { flex: 1; }
    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .mode-badge.viewer  { background: var(--badge-viewer);  color: #e0e0e0; }
    .mode-badge.editor  { background: var(--badge-editor);  color: #bbdefb; }
    .mode-badge.admin   { background: var(--badge-admin);   color: #e1bee7; }
    .header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      transition: background 0.1s, color 0.1s;
    }
    .header-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .header-btn.active { color: var(--accent); }

    /* ── 메인 콘텐츠 플레이스홀더 ── */

    /* ── 2단계: 레이아웃 ── */
    #main {
      flex: 1;
      overflow: hidden;
      display: flex;
    }

    /* 사이드바 */
    #sidebar {
      width: 200px;
      min-width: 160px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    #sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }
    .sidebar-icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      transition: background 0.1s, color 0.1s;
    }
    .sidebar-icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    #scene-list { flex: 1; overflow-y: auto; padding: 4px; }
    .sidebar-empty {
      padding: 16px 8px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .scene-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }
    .scene-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .scene-item.active { background: var(--bg-active); color: #fff; }
    .scene-item svg { flex-shrink: 0; }
    .scene-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .scene-progress-mini {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .scene-item.active .scene-progress-mini { color: rgba(255,255,255,0.6); }

    /* 콘텐츠 */
    #content {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    /* 대시보드 */
    #view-dashboard { padding: 20px 24px; }
    #dashboard-header { margin-bottom: 20px; }
    #dashboard-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 4px;
    }
    .dashboard-sub { font-size: 12px; color: var(--text-muted); }
    #dashboard-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); }
    .stat-val { font-size: 22px; font-weight: 600; color: var(--text-bright); }
    .stat-val.green { color: var(--success); }
    #dashboard-scene-list { display: flex; flex-direction: column; gap: 8px; }
    .dash-scene-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .dash-scene-card:hover { border-color: var(--accent); }
    .dash-scene-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .dash-scene-card-name { font-size: 13px; font-weight: 500; color: var(--text-bright); }
    .dash-scene-card-count { font-size: 11px; color: var(--text-muted); }
    .progress-bar {
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .progress-fill.done { background: var(--success); }

    /* 체크리스트 */
    #view-checklist { display: flex; flex-direction: column; height: 100%; }
    #checklist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    #checklist-title-row { display: flex; align-items: center; gap: 16px; flex: 1; min-width: 0; }
    #checklist-scene-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #checklist-progress-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    #checklist-progress-bar {
      width: 120px;
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }
    #checklist-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s;
    }
    #checklist-progress-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    #checklist-table-wrap { flex: 1; overflow: auto; }
    #checklist-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    #checklist-table th {
      position: sticky;
      top: 0;
      background: var(--bg-secondary);
      padding: 7px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      z-index: 1;
    }
    #checklist-table td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      vertical-align: middle;
    }
    #checklist-table tr:hover td { background: var(--bg-hover); }
    .table-empty { text-align: center; color: var(--text-muted); padding: 32px !important; }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
    }
    .status-pending  { background: rgba(100,100,100,0.2); color: var(--text-secondary); }
    .status-matched  { background: rgba(0,122,204,0.15);  color: #5aadee; }
    .status-done     { background: rgba(76,175,80,0.15);  color: #6fcf70; }

    /* ── 스테이터스바 ── */
    #statusbar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 14px;
      height: 22px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      flex-shrink: 0;
    }
    #statusbar span { opacity: 0.9; }
    #statusbar #status-mode { font-weight: 600; }

    /* ── 모달 오버레이 ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 340px;
      max-width: calc(100vw - 32px);
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
    }
    .modal-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
    }
    .modal-header svg { color: var(--accent); }
    .modal label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .modal input[type="password"],
    .modal input[type="text"] {
      width: 100%;
      height: 32px;
      margin-bottom: 14px;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      border: 1px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .btn-ghost {
      color: var(--text-secondary);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    .modal-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: -8px;
      margin-bottom: 10px;
      display: none;
    }
    .modal-error.show { display: block; }

    /* ── 모드 선택 버튼 그룹 ── */
    .mode-select-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .mode-select-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      transition: border-color 0.1s, background 0.1s, color 0.1s;
    }
    .mode-select-btn:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-hover); }
    .mode-select-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(0,122,204,0.08); }
    .mode-select-btn svg { width: 18px; height: 18px; }


    /* ── 3단계: 에셋 뷰 ── */
    #view-assets { display: flex; flex-direction: column; height: 100%; }
    #asset-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    #asset-header-title { font-size: 13px; font-weight: 600; color: var(--text-bright); margin-right: 4px; }
    .filter-select { height: 26px; font-size: 12px; min-width: 110px; }
    #asset-table-wrap { flex: 1; overflow: auto; }
    #asset-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    #asset-table th {
      position: sticky; top: 0; background: var(--bg-secondary);
      padding: 7px 10px; text-align: left; font-size: 11px; font-weight: 600;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      white-space: nowrap; z-index: 1;
    }
    #asset-table td {
      padding: 7px 10px; border-bottom: 1px solid var(--border);
      color: var(--text-primary); vertical-align: middle;
    }
    #asset-table tr:hover td { background: var(--bg-hover); }
    .cat-icon { font-size: 15px; }
    .keyword-tag {
      display: inline-block; background: var(--bg-tertiary);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 1px 5px; font-size: 10px; color: var(--text-secondary); margin: 1px;
    }
    .btn-copy-path {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: var(--radius-sm); font-size: 11px;
      background: var(--bg-tertiary); border: 1px solid var(--border);
      color: var(--text-secondary); cursor: pointer; white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .btn-copy-path:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-danger-sm {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: var(--radius-sm); font-size: 11px;
      background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.3);
      color: var(--danger); cursor: pointer;
    }
    .btn-danger-sm:hover { background: rgba(244,67,54,0.2); }
    .btn-done-sm {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 7px; border-radius: var(--radius-sm); font-size: 11px;
      background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3);
      color: var(--success); cursor: pointer;
    }
    .btn-done-sm:hover { background: rgba(76,175,80,0.2); }
    /* 탭 */
    #scene-tabs {
      display: flex; gap: 2px; padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary); flex-shrink: 0;
    }
    .tab-btn {
      padding: 8px 14px; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); border-bottom: 2px solid transparent;
      cursor: pointer; transition: color 0.1s, border-color 0.1s; white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text-primary); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    /* 에셋 등록 폼 */
    #asset-form-wrap {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
    }
    #asset-form-wrap h3 {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1.5fr 120px 1fr auto;
      gap: 8px; align-items: end;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; color: var(--text-muted); }
    .form-group input, .form-group select { height: 28px; font-size: 12px; }
    .form-group input { width: 100%; }
    /* 관리자 패널 */
    #admin-panel { padding: 20px 24px; max-width: 600px; }
    #admin-panel h2 {
      font-size: 15px; font-weight: 600; color: var(--text-bright); margin-bottom: 20px;
    }
    .admin-section {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 12px;
    }
    .admin-section h3 {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
    }
    .admin-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .admin-row input { height: 28px; font-size: 12px; flex: 1; min-width: 140px; }
    .btn-danger {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
      background: rgba(244,67,54,0.12); border: 1px solid rgba(244,67,54,0.35);
      color: var(--danger); cursor: pointer;
    }
    .btn-danger:hover { background: rgba(244,67,54,0.22); }
    /* 토스트 */
    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #333; color: #fff; padding: 8px 18px;
      border-radius: var(--radius-md); font-size: 12px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 2000; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* 모바일 씬 드롭다운 */
    #mobile-scene-select {
      display: none; height: 28px; font-size: 12px; flex: 1; max-width: 200px;
    }
    /* 반응형 */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #mobile-scene-select { display: block; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .btn { grid-column: 1 / -1; }
      #dashboard-stats { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 1440px) {
      #sidebar { width: 220px; }
    }

    /* ── 유틸 ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── 헤더 ── -->
  <header id="header">
    <div id="header-logo">
      <i data-lucide="box" style="width:16px;height:16px;"></i>
      ShareBox
    </div>
    <div id="header-divider"></div>
    <select id="project-select" title="프로젝트 선택">
      <option value="">── 프로젝트 선택 ──</option>
    </select>

const state = {

/* ═══════════════════════════════════════

function applyTheme(theme) {
  state.theme = theme;
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.querySelector('#btn-theme [data-lucide]');
  if (icon) {
    icon.setAttribute('data-lucide', theme === 'dark' ? 'sun' : 'moon');
    renderIcons();
  }
  localStorage.setItem('sb_theme', theme);
}

document.getElementById('btn-theme').addEventListener('click', () => {
  applyTheme(state.theme === 'dark' ? 'light' : 'dark');
});

/* ═══════════════════════════════════════
   모드 UI 갱신
═══════════════════════════════════════ */
const MODE_META = {
  viewer: { label: '뷰어',  icon: 'eye',          cls: 'viewer'  },
  editor: { label: '에디터', icon: 'pencil',       cls: 'editor'  },
  admin:  { label: '관리자', icon: 'shield-check',  cls: 'admin'   },
};

function applyMode(mode) {
  state.mode = mode;
  const meta = MODE_META[mode];
  const badge = document.getElementById('mode-badge');
  badge.className = `mode-badge ${meta.cls}`;
  badge.innerHTML = `<i data-lucide="${meta.icon}" style="width:11px;height:11px;"></i> ${meta.label}`;
  document.getElementById('status-mode').textContent = meta.label.toUpperCase();
  const canEdit = mode === 'editor' || mode === 'admin';
  document.getElementById('btn-add-scene').classList.toggle('hidden', !canEdit);
  document.getElementById('btn-add-item').classList.toggle('hidden', !canEdit);
  updateEditorColumns();
  renderIcons();
}

/* ═══════════════════════════════════════
   프로젝트 목록 로드
═══════════════════════════════════════ */
async function loadProjects() {
  const { data, error } = await db
    .from('projects')
    .select('id, name')
    .order('created_at', { ascending: true });

  const sel = document.getElementById('project-select');
  sel.innerHTML = '<option value="">── 프로젝트 선택 ──</option>';

  if (error) {
    document.getElementById('status-db').textContent = '● DB 오류';
    console.error(error);
    return;
  }

  (data || []).forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });

  document.getElementById('status-db').textContent = '● DB 연결됨';
}

document.getElementById('project-select').addEventListener('change', function() {
  state.projectId = this.value || null;
  state.sceneId = null;
  const opt = this.options[this.selectedIndex];
  state.projectName = this.value ? opt.textContent : '';
  document.getElementById('status-project').textContent =
    state.projectName || '프로젝트 없음';
  if (state.projectId) {
    loadScenes(state.projectId);
  } else {
    renderSceneList([]);
    showDashboard(null);
  }
});

/* ═══════════════════════════════════════
   모드 변경 모달
═══════════════════════════════════════ */
let targetMode = 'viewer';

const modal      = document.getElementById('modal-mode');
const pwSection  = document.getElementById('pw-section');
const pwInput    = document.getElementById('pw-input');
const pwError    = document.getElementById('pw-error');
const pwLabel    = document.getElementById('pw-label');

function openModeModal() {
  targetMode = state.mode;
  pwSection.classList.add('hidden');
  pwInput.value = '';
  pwError.classList.remove('show');
  modal.classList.remove('hidden');
  // 현재 모드 버튼 선택 표시
  document.querySelectorAll('.mode-select-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.target === state.mode);
  });
  renderIcons();
}

document.getElementById('btn-mode-change').addEventListener('click', openModeModal);
document.getElementById('btn-modal-cancel').addEventListener('click', () => {
  modal.classList.add('hidden');
});
modal.addEventListener('click', e => {
  if (e.target === modal) modal.classList.add('hidden');
});

document.querySelectorAll('.mode-select-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-select-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    targetMode = btn.dataset.target;

    if (targetMode === 'viewer') {
      pwSection.classList.add('hidden');
    } else {
      pwLabel.textContent = targetMode === 'admin' ? '관리자 비밀번호' : '에디터 비밀번호';
      pwSection.classList.remove('hidden');
      pwInput.focus();
    }
    pwError.classList.remove('show');
  });
});

pwInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmMode();
});

document.getElementById('btn-modal-confirm').addEventListener('click', confirmMode);

async function confirmMode() {
  pwError.classList.remove('show');

  if (targetMode === 'viewer') {
    applyMode('viewer');
    modal.classList.add('hidden');
    return;
  }

  const pw = pwInput.value.trim();
  if (!pw) { pwError.classList.add('show'); return; }

  if (targetMode === 'admin') {
    if (pw === ADMIN_PASS) {
      applyMode('admin');
      modal.classList.add('hidden');
    } else {
      pwError.classList.add('show');
    }
    return;
  }

  if (targetMode === 'editor') {
    const { data, error } = await db
      .from('settings')
      .select('value')
      .eq('key', 'editor_password')
      .single();

    if (error || !data) {
      pwError.textContent = 'DB에서 비밀번호를 가져올 수 없습니다.';
      pwError.classList.add('show');
      return;
    }
    if (pw === data.value) {
      applyMode('editor');
      modal.classList.add('hidden');
    } else {
      pwError.textContent = '비밀번호가 올바르지 않습니다.';
      pwError.classList.add('show');
    }
  }
}


/* ═══════════════════════════════════════
   2단계: 씬 목록 + 체크리스트 + 대시보드

const STATUS_META = {
  pending: { label: '대기',   cls: 'status-pending' },
  matched: { label: '매칭됨', cls: 'status-matched' },
  done:    { label: '완료',   cls: 'status-done'    },
};

/* 씬 목록 로드 */
async function loadScenes(projectId) {
  const { data, error } = await db
    .from('scenes')
    .select('id, name')
    .eq('project_id', projectId)
    .order('created_at', { ascending: true });

  if (error) { console.error(error); return; }
  renderSceneList(data || []);
  showDashboard(data || []);
}

/* 씬 사이드바 렌더 */
function renderSceneList(scenes) {
  const list = document.getElementById('scene-list');
  if (!scenes.length) {
    list.innerHTML = '<div class="sidebar-empty">씬이 없습니다</div>';
    return;
  }
  list.innerHTML = scenes.map(s => `
    <div class="scene-item" data-id="${s.id}" data-name="${s.name}">
      <i data-lucide="film" style="width:13px;height:13px;flex-shrink:0"></i>
      <span class="scene-item-name">${s.name}</span>
    </div>`).join('');
  list.querySelectorAll('.scene-item').forEach(el => {
    el.addEventListener('click', () => selectScene(el.dataset.id, el.dataset.name));
  });
  renderIcons();
}

/* 씬 선택 */
async function selectScene(sceneId, sceneName) {
  state.sceneId = sceneId;
  state.sceneName = sceneName;

  document.querySelectorAll('.scene-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === sceneId));

  document.getElementById('view-dashboard').classList.add('hidden');
  document.getElementById('view-checklist').classList.remove('hidden');
  document.getElementById('checklist-scene-name').textContent = sceneName;

  const canEdit = state.mode === 'editor' || state.mode === 'admin';
  document.getElementById('btn-add-item').classList.toggle('hidden', !canEdit);

  await loadChecklist(sceneId);
}

/* 체크리스트 로드 */
async function loadChecklist(sceneId) {
  const tbody = document.getElementById('checklist-tbody');
  tbody.innerHTML = '<tr><td colspan="5" class="table-empty">로딩 중...</td></tr>';

  const { data, error } = await db
    .from('checklist_items')
    .select('id, name, status, matched_asset_id')
    .eq('scene_id', sceneId)
    .order('name', { ascending: true });

  if (error) {
    tbody.innerHTML = '<tr><td colspan="5" class="table-empty">로드 오류</td></tr>';
    console.error(error);
    return;
  }

  const items = data || [];
  updateProgressBar(items);

  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="table-empty">항목이 없습니다</td></tr>';
    return;
  }

  tbody.innerHTML = items.map(item => {
    const sm = STATUS_META[item.status] || STATUS_META.pending;
    return `<tr data-id="${item.id}">
      <td><span class="status-badge ${sm.cls}">${sm.label}</span></td>
      <td>${item.name}</td>
      <td>—</td>
      <td>${item.matched_asset_id ? '<span style="color:var(--accent);font-size:11px;">연결됨</span>' : '<span style="color:var(--text-muted);font-size:11px;">없음</span>'}</td>
      <td class="editor-only hidden"></td>
    </tr>`;
  }).join('');

  updateEditorColumns();
}

/* 진행률 바 갱신 */
function updateProgressBar(items) {
  const total = items.length;
  const done  = items.filter(i => i.status === 'done').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('checklist-progress-fill').style.width = pct + '%';
  document.getElementById('checklist-progress-label').textContent = `${done} / ${total}`;
}

/* 대시보드 */
async function showDashboard(scenes) {
  document.getElementById('view-dashboard').classList.remove('hidden');
  document.getElementById('view-checklist').classList.add('hidden');

  if (!scenes || !scenes.length) {
    document.getElementById('dashboard-title').textContent =
      state.projectName || '프로젝트를 선택하세요';
    document.getElementById('dashboard-sub').textContent = '';
    document.getElementById('dashboard-stats').classList.add('hidden');
    document.getElementById('dashboard-scene-list').classList.add('hidden');
    return;
  }

  document.getElementById('dashboard-title').textContent = state.projectName;
  document.getElementById('dashboard-sub').textContent = `씬 ${scenes.length}개`;

  /* 각 씬의 체크리스트 집계 */
  const sceneIds = scenes.map(s => s.id);
  const { data: items } = await db
    .from('checklist_items')
    .select('scene_id, status')
    .in('scene_id', sceneIds);

  const byScene = {};
  (items || []).forEach(i => {
    if (!byScene[i.scene_id]) byScene[i.scene_id] = { total: 0, done: 0 };
    byScene[i.scene_id].total++;
    if (i.status === 'done') byScene[i.scene_id].done++;
  });

  const totalItems = (items || []).length;
  const totalDone  = (items || []).filter(i => i.status === 'done').length;
  const pct = totalItems ? Math.round(totalDone / totalItems * 100) : 0;

  document.getElementById('stat-scenes').textContent = scenes.length;
  document.getElementById('stat-total').textContent  = totalItems;
  document.getElementById('stat-done').textContent   = totalDone;
  document.getElementById('stat-pct').textContent    = pct + '%';
  document.getElementById('dashboard-stats').classList.remove('hidden');

  const sceneListEl = document.getElementById('dashboard-scene-list');
  sceneListEl.classList.remove('hidden');
  sceneListEl.innerHTML = scenes.map(s => {
    const info = byScene[s.id] || { total: 0, done: 0 };
    const sp = info.total ? Math.round(info.done / info.total * 100) : 0;
    const fillCls = sp === 100 ? 'progress-fill done' : 'progress-fill';
    return `<div class="dash-scene-card" data-id="${s.id}" data-name="${s.name}">
      <div class="dash-scene-card-top">
        <span class="dash-scene-card-name">${s.name}</span>
        <span class="dash-scene-card-count">${info.done}/${info.total} · ${sp}%</span>
      </div>
      <div class="progress-bar"><div class="${fillCls}" style="width:${sp}%"></div></div>
    </div>`;
  }).join('');

  sceneListEl.querySelectorAll('.dash-scene-card').forEach(el => {
    el.addEventListener('click', () => selectScene(el.dataset.id, el.dataset.name));
  });
}

/* 에디터/관리자 컬럼 표시 */
function updateEditorColumns() {
  const canEdit = state.mode === 'editor' || state.mode === 'admin';
  document.querySelectorAll('.editor-only').forEach(el =>
    el.classList.toggle('hidden', !canEdit));
}


/* ═══════════════════════════════════════
   3단계: 에셋 + 자동매칭 + 관리자 + 반응형
═══════════════════════════════════════ */

const CAT_ICON = {
  texture:'🖼', model:'📦', audio:'🔊', animation:'🎬',
  vfx:'✨', ui:'🖥', prefab:'🧩', script:'📝', other:'📁'
};

/* 토스트 */
let toastTimer;
function showToast(msg, duration) {
  duration = duration || 2200;
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, duration);
}

/* 확인 모달 */
function showConfirm(title, msg) {
  return new Promise(function(resolve) {
    document.getElementById('modal-confirm-title').textContent = title;
    document.getElementById('modal-confirm-msg').textContent = msg;
    var mc = document.getElementById('modal-confirm');
    mc.classList.remove('hidden');
    renderIcons();
    var ok     = document.getElementById('btn-confirm-ok');
    var cancel = document.getElementById('btn-confirm-cancel');
    function cleanup(result) {
      mc.classList.add('hidden');
      ok.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      mc.removeEventListener('click', onOverlay);
      resolve(result);
    }
    function onOk()      { cleanup(true);  }
    function onCancel()  { cleanup(false); }
    function onOverlay(e){ if (e.target === mc) cleanup(false); }
    ok.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
    mc.addEventListener('click', onOverlay);
  });
}

/* 탭 전환 */
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    var tab = btn.dataset.tab;
    document.getElementById('tab-checklist').classList.toggle('hidden', tab !== 'checklist');
    document.getElementById('tab-assets').classList.toggle('hidden', tab !== 'assets');
    if (tab === 'assets' && state.sceneId) loadAssets(state.sceneId);
  });
});

/* 관리자 패널 토글 */
document.getElementById('btn-admin-panel').addEventListener('click', function() {
  var v = document.getElementById('view-admin');
  var isHidden = v.classList.contains('hidden');
  document.getElementById('view-dashboard').classList.add('hidden');
  document.getElementById('view-checklist').classList.add('hidden');
  v.classList.toggle('hidden', !isHidden);
});

/* 모바일 씬 드롭다운 */
document.getElementById('mobile-scene-select').addEventListener('change', function() {
  if (this.value) {
    var opt = this.options[this.selectedIndex];
    selectScene(this.value, opt.textContent);
  }
});

/* 에셋 로드 */
var allAssets = [];
async function loadAssets(sceneId) {
  var tbody = document.getElementById('asset-tbody');
  tbody.innerHTML = '<tr><td colspan="6" class="table-empty">로딩 중...</td></tr>';
  var result = await db.from('assets').select('id, name, nas_path, category, keywords')
    .eq('scene_id', sceneId).order('name', { ascending: true });
  if (result.error) {
    tbody.innerHTML = '<tr><td colspan="6" class="table-empty">로드 오류</td></tr>';
    console.error(result.error); return;
  }
  allAssets = result.data || [];
  renderAssetTable(allAssets);
}

function renderAssetTable(assets) {
  var tbody = document.getElementById('asset-tbody');
  var canEdit = state.mode === 'editor' || state.mode === 'admin';
  var isAdmin = state.mode === 'admin';
  if (!assets.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="table-empty">에셋이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = assets.map(function(a) {
    var icon = CAT_ICON[a.category] || '📁';
    var tags = (a.keywords || '').split(',').map(function(k) { return k.trim(); })
      .filter(Boolean).map(function(k) { return '<span class="keyword-tag">' + k + '</span>'; }).join('');
    var copyBtn = canEdit
      ? '<button class="btn-copy-path" data-path="' + (a.nas_path||'') + '"><i data-lucide="copy" style="width:11px;height:11px;"></i> 복사</button>'
      : '';
    var delBtn = isAdmin
      ? '<button class="btn-danger-sm" data-asset-id="' + a.id + '"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button>'
      : '';
    return '<tr data-asset-id="' + a.id + '">'
      + '<td class="cat-icon">' + icon + '</td>'
      + '<td style="font-size:12px;word-break:break-all;">' + a.name + '</td>'
      + '<td style="font-size:11px;color:var(--text-muted);text-transform:capitalize;">' + (a.category||'') + '</td>'
      + '<td>' + tags + '</td>'
      + '<td class="editor-only' + (canEdit ? '' : ' hidden') + '">' + copyBtn + '</td>'
      + '<td class="admin-only' + (isAdmin ? '' : ' hidden') + '">' + delBtn + '</td>'
      + '</tr>';
  }).join('');

  tbody.querySelectorAll('.btn-copy-path').forEach(function(btn) {
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText(btn.dataset.path)
        .then(function() { showToast('경로가 복사되었습니다 ✓'); })
        .catch(function() { showToast('복사 실패'); });
    });
  });

  tbody.querySelectorAll('.btn-danger-sm').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var ok = await showConfirm('에셋 삭제', '이 에셋을 삭제하시겠습니까?');
      if (!ok) return;
      var r = await db.from('assets').delete().eq('id', btn.dataset.assetId);
      if (r.error) { showToast('삭제 실패'); return; }
      showToast('삭제되었습니다');
      allAssets = allAssets.filter(function(a) { return a.id !== btn.dataset.assetId; });
      renderAssetTable(filterAssets());
    });
  });
  renderIcons();
}

function filterAssets() {
  var cat = document.getElementById('filter-category').value;
  return cat ? allAssets.filter(function(a) { return a.category === cat; }) : allAssets;
}
document.getElementById('filter-category').addEventListener('change', function() {
  renderAssetTable(filterAssets());
});

/* 에셋 저장 */
document.getElementById('btn-save-asset').addEventListener('click', async function() {
  var name     = document.getElementById('af-name').value.trim();
  var nas_path = document.getElementById('af-path').value.trim();
  var category = document.getElementById('af-category').value;
  var keywords = document.getElementById('af-keywords').value.trim();
  if (!name || !nas_path) { showToast('파일명과 경로는 필수입니다'); return; }
  if (!state.sceneId) { showToast('씬을 먼저 선택하세요'); return; }
  var r = await db.from('assets').insert([{
    scene_id: state.sceneId, name: name, nas_path: nas_path,
    category: category, keywords: keywords
  }]).select().single();
  if (r.error) { showToast('저장 실패: ' + r.error.message); return; }
  showToast('에셋이 등록되었습니다 ✓');
  document.getElementById('af-name').value = '';
  document.getElementById('af-path').value = '';
  document.getElementById('af-keywords').value = '';
  await autoMatch(r.data);
  await loadAssets(state.sceneId);
});

/* 자동 매칭 */
async function autoMatch(asset) {
  if (!state.sceneId) return;
  var r = await db.from('checklist_items').select('id, name, status')
    .eq('scene_id', state.sceneId).neq('status', 'done');
  if (!r.data || !r.data.length) return;
  var keywords = (asset.keywords || '').split(',').map(function(k) { return k.trim().toLowerCase(); }).filter(Boolean);
  var category = (asset.category || '').toLowerCase();
  for (var i = 0; i < r.data.length; i++) {
    var item = r.data[i];
    var itemName = item.name.toLowerCase();
    var isMatch = keywords.some(function(k) { return k && itemName.includes(k); })
                  || (category && itemName.includes(category));
    if (isMatch && item.status !== 'matched') {
      await db.from('checklist_items')
        .update({ status: 'matched', matched_asset_id: asset.id })
        .eq('id', item.id);
    }
  }
  var tabCl = document.getElementById('tab-checklist');
  if (tabCl && !tabCl.classList.contains('hidden')) await loadChecklist(state.sceneId);
}

/* 체크리스트 로드 재정의 (done 처리 + 삭제 포함) */
async function loadChecklist(sceneId) {
  var tbody = document.getElementById('checklist-tbody');
  tbody.innerHTML = '<tr><td colspan="4" class="table-empty">로딩 중...</td></tr>';
  var r = await db.from('checklist_items')
    .select('id, name, status, matched_asset_id')
    .eq('scene_id', sceneId).order('name', { ascending: true });
  if (r.error) {
    tbody.innerHTML = '<tr><td colspan="4" class="table-empty">로드 오류</td></tr>';
    return;
  }
  var items = r.data || [];
  updateProgressBar(items);
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="table-empty">항목이 없습니다</td></tr>';
    return;
  }
  var canEdit = state.mode === 'editor' || state.mode === 'admin';
  var isAdmin = state.mode === 'admin';
  tbody.innerHTML = items.map(function(item) {
    var sm = STATUS_META[item.status] || STATUS_META.pending;
    var actions = '';
    if (canEdit) {
      if (item.status !== 'done') actions += '<button class="btn-done-sm" data-id="' + item.id + '" title="완료"><i data-lucide="check" style="width:11px;height:11px;"></i></button> ';
      if (isAdmin) actions += '<button class="btn-danger-sm" data-chk-id="' + item.id + '"><i data-lucide="trash-2" style="width:11px;height:11px;"></i></button>';
    }
    var assetCell = item.matched_asset_id
      ? '<span style="color:var(--accent);font-size:11px;">연결됨</span>'
      : '<span style="color:var(--text-muted);font-size:11px;">없음</span>';
    return '<tr data-id="' + item.id + '">'
      + '<td><span class="status-badge ' + sm.cls + '">' + sm.label + '</span></td>'
      + '<td>' + item.name + '</td>'
      + '<td>' + assetCell + '</td>'
      + '<td class="editor-only' + (canEdit ? '' : ' hidden') + '" style="display:flex;gap:4px;align-items:center;">' + actions + '</td>'
      + '</tr>';
  }).join('');

  tbody.querySelectorAll('.btn-done-sm').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      await db.from('checklist_items').update({ status: 'done' }).eq('id', btn.dataset.id);
      await loadChecklist(sceneId);
      showToast('완료 처리되었습니다 ✓');
    });
  });
  tbody.querySelectorAll('[data-chk-id]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var ok = await showConfirm('항목 삭제', '이 항목을 삭제하시겠습니까?');
      if (!ok) return;
      await db.from('checklist_items').delete().eq('id', btn.dataset.chkId);
      await loadChecklist(sceneId);
      showToast('삭제되었습니다');
    });
  });
  updateEditorColumns();
  renderIcons();
}

/* selectScene 재정의 */
async function selectScene(sceneId, sceneName) {
  state.sceneId = sceneId;
  state.sceneName = sceneName;
  document.querySelectorAll('.scene-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.id === sceneId);
  });
  document.getElementById('view-dashboard').classList.add('hidden');
  document.getElementById('view-admin').classList.add('hidden');
  document.getElementById('view-checklist').classList.remove('hidden');
  document.getElementById('checklist-scene-name').textContent = sceneName;
  // 탭 초기화
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelector('.tab-btn[data-tab="checklist"]').classList.add('active');
  document.getElementById('tab-checklist').classList.remove('hidden');
  document.getElementById('tab-assets').classList.add('hidden');
  var canEdit = state.mode === 'editor' || state.mode === 'admin';
  document.getElementById('btn-add-item').classList.toggle('hidden', !canEdit);
  document.getElementById('mobile-scene-select').value = sceneId;
  await loadChecklist(sceneId);
}

/* renderSceneList 재정의: 모바일 드롭다운도 채움 */
function renderSceneList(scenes) {
  var list = document.getElementById('scene-list');
  var mSel = document.getElementById('mobile-scene-select');
  mSel.innerHTML = '<option value="">── 씬 선택 ──</option>';
  if (!scenes.length) {
    list.innerHTML = '<div class="sidebar-empty">씬이 없습니다</div>';
    return;
  }
  list.innerHTML = scenes.map(function(s) {
    return '<div class="scene-item" data-id="' + s.id + '" data-name="' + s.name + '">'
      + '<i data-lucide="film" style="width:13px;height:13px;flex-shrink:0"></i>'
      + '<span class="scene-item-name">' + s.name + '</span>'
      + '</div>';
  }).join('');
  scenes.forEach(function(s) {
    var opt = document.createElement('option');
    opt.value = s.id; opt.textContent = s.name;
    mSel.appendChild(opt);
  });
  list.querySelectorAll('.scene-item').forEach(function(el) {
    el.addEventListener('click', function() { selectScene(el.dataset.id, el.dataset.name); });
  });
  renderIcons();
}

/* applyMode 재정의: admin-only 처리 포함 */
function applyMode(mode) {
  state.mode = mode;
  var meta = MODE_META[mode];
  var badge = document.getElementById('mode-badge');
  badge.className = 'mode-badge ' + meta.cls;
  badge.innerHTML = '<i data-lucide="' + meta.icon + '" style="width:11px;height:11px;"></i> ' + meta.label;
  document.getElementById('status-mode').textContent = meta.label.toUpperCase();
  var canEdit = mode === 'editor' || mode === 'admin';
  var isAdmin = mode === 'admin';
  document.getElementById('btn-add-scene').classList.toggle('hidden', !canEdit);
  document.getElementById('btn-add-item').classList.toggle('hidden', !canEdit);
  document.getElementById('btn-admin-panel').classList.toggle('hidden', !isAdmin);
  document.querySelectorAll('.editor-only').forEach(function(el) { el.classList.toggle('hidden', !canEdit); });
  document.querySelectorAll('.admin-only').forEach(function(el)  { el.classList.toggle('hidden', !isAdmin); });
  if (!isAdmin) document.getElementById('view-admin').classList.add('hidden');
  renderIcons();
}

/* 관리자: 에디터 비번 변경 */
document.getElementById('btn-change-pw').addEventListener('click', async function() {
  var newPw = document.getElementById('new-editor-pw').value.trim();
  if (!newPw) { showToast('새 비밀번호를 입력하세요'); return; }
  var r = await db.from('settings').upsert({ key: 'editor_password', value: newPw }, { onConflict: 'key' });
  if (r.error) { showToast('변경 실패: ' + r.error.message); return; }
  document.getElementById('new-editor-pw').value = '';
  showToast('에디터 비밀번호가 변경되었습니다 ✓');
});

/* 관리자: JSON 백업 */
document.getElementById('btn-backup').addEventListener('click', async function() {
  if (!state.projectId) { showToast('프로젝트를 먼저 선택하세요'); return; }
  showToast('백업 데이터 수집 중...');
  var results = await Promise.all([
    db.from('scenes').select('*').eq('project_id', state.projectId),
    db.from('checklist_items').select('*'),
    db.from('assets').select('*'),
  ]);
  var backup = {
    exported_at: new Date().toISOString(),
    project_id: state.projectId,
    project_name: state.projectName,
    scenes: results[0].data || [],
    checklist_items: results[1].data || [],
    assets: results[2].data || [],
  };
  var blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'sharebox_backup_' + state.projectName + '_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('백업 다운로드 완료 ✓');
});

/* 관리자: 프로젝트 초기화 */
document.getElementById('btn-reset-project').addEventListener('click', async function() {
  if (!state.projectId) { showToast('프로젝트를 먼저 선택하세요'); return; }
  var ok = await showConfirm('프로젝트 초기화',
    '"' + state.projectName + '"의 모든 씬, 에셋, 체크리스트를 삭제합니다. 되돌릴 수 없습니다.');
  if (!ok) return;
  showToast('초기화 중...');
  var sr = await db.from('scenes').select('id').eq('project_id', state.projectId);
  var ids = (sr.data || []).map(function(s) { return s.id; });
  if (ids.length) {
    await db.from('checklist_items').delete().in('scene_id', ids);
    await db.from('assets').delete().in('scene_id', ids);
    await db.from('scenes').delete().eq('project_id', state.projectId);
  }
  state.sceneId = null;
  renderSceneList([]);
  showDashboard([]);
  document.getElementById('view-admin').classList.add('hidden');
  showToast('초기화 완료 ✓');
});

/* ═══════════════════════════════════════
   초기화
═══════════════════════════════════════ */
(async function init() {
  const savedTheme = localStorage.getItem('sb_theme') || 'dark';
  applyTheme(savedTheme);
  renderIcons();
  await loadProjects();
  showDashboard(null);
})();
</script>
